[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is intentionally left blank here — alembic/env.py reads
# the real URL from app.core.config.get_settings().database_url at
# runtime, so there's exactly one source of truth for the DB URL (the
# same Settings/.env used by the running app) instead of two that can
# drift out of sync.
sqlalchemy.url =

[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
